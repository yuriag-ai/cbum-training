function fmt(s) {
  const sec = Math.max(0, Math.ceil(s));
  return `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, "0")}`;
}

// ── Audio: single shared AudioContext, initialized on first user tap ──
const audioRef = { ctx: null };

function initAudio() {
  if (!audioRef.ctx) {
    try {
      audioRef.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {}
  }
  // Resume if suspended (iOS requires this after each interaction)
  if (audioRef.ctx && audioRef.ctx.state === "suspended") {
    audioRef.ctx.resume().catch(() => {});
  }
}

function beep() {
  const ctx = audioRef.ctx;
  if (!ctx) return;
  try {
    if (ctx.state === "suspended") ctx.resume();
    const tone = (f, t, d) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = "sine";
      g.gain.setValueAtTime(0.4, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + d);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + d);
    };
    tone(880, 0, 0.12); tone(880, 0.2, 0.12); tone(1174, 0.42, 0.3);
  } catch (e) {}
}

// ── Vibration fallback for silent mode ──
function alertUser() {
  beep();
  if (navigator.vibrate) {
    navigator.vibrate([200, 100, 200, 100, 300]);
  }
}

// ── Timer Component (timestamp-based for background resilience) ──
function Timer({ secs, setSecs, running, setRunning, total, setTotal, exName, setExName, color, accent }) {
  const [open, setOpen] = useState(false);
  const endTimeRef = useRef(null);
  const rafRef = useRef(null);
  const alertedRef = useRef(false);

  // Timestamp-based tick: survives background throttling
  const tick = useCallback(() => {
    if (!endTimeRef.current) return;
    const remaining = (endTimeRef.current - Date.now()) / 1000;
    if (remaining <= 0) {
      setSecs(0);
      setRunning(false);
      endTimeRef.current = null;
      if (!alertedRef.current) {
        alertedRef.current = true;
        alertUser();
      }
      return;
    }
    setSecs(remaining);
    rafRef.current = requestAnimationFrame(tick);
  }, [setSecs, setRunning]);

  useEffect(() => {
    if (running && endTimeRef.current) {
      alertedRef.current = false;
      const loop = () => {
        if (!endTimeRef.current) return;
        const remaining = (endTimeRef.current - Date.now()) / 1000;
        if (remaining <= 0) {
          setSecs(0);
          setRunning(false);
          endTimeRef.current = null;
          if (!alertedRef.current) { alertedRef.current = true; alertUser(); }
          return;
        }
        setSecs(remaining);
        rafRef.current = requestAnimationFrame(loop);
      };
      rafRef.current = requestAnimationFrame(loop);
    }
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [running]);

  // Also use setInterval as fallback for when rAF is paused in background
  useEffect(() => {
    if (!running) return;
    const iv = setInterval(() => {
      if (!endTimeRef.current) { clearInterval(iv); return; }
      const remaining = (endTimeRef.current - Date.now()) / 1000;
      if (remaining <= 0) {
        setSecs(0); setRunning(false); endTimeRef.current = null;
        if (!alertedRef.current) { alertedRef.current = true; alertUser(); }
        clearInterval(iv);
        return;
      }
      setSecs(remaining);
    }, 500);
    return () => clearInterval(iv);
  }, [running]);

  // Visibility change: recalculate on return from background
  useEffect(() => {
    const handleVis = () => {
      if (document.visibilityState === "visible" && endTimeRef.current) {
        const remaining = (endTimeRef.current - Date.now()) / 1000;
        if (remaining <= 0) {
          setSecs(0); setRunning(false); endTimeRef.current = null;
          if (!alertedRef.current) { alertedRef.current = true; alertUser(); }
        } else {
          setSecs(remaining);
        }
      }
    };
    document.addEventListener("visibilitychange", handleVis);
    return () => document.removeEventListener("visibilitychange", handleVis);
  }, []);

  const go = (s) => {
    initAudio();
    endTimeRef.current = Date.now() + s * 1000;
    setSecs(s); setTotal(s); setRunning(true); setExName("");
    alertedRef.current = false;
  };

  const toggle = () => {
    initAudio();
    if (running) {
      // Pause: save remaining
      const remaining = endTimeRef.current ? (endTimeRef.current - Date.now()) / 1000 : secs;
      endTimeRef.current = null;
      setSecs(Math.max(0, remaining));
      setRunning(false);
    } else if (secs > 0) {
      // Resume
      endTimeRef.current = Date.now() + Math.ceil(secs) * 1000;
      setRunning(true);
    }
  };

  const reset = () => {
    endTimeRef.current = null;
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    setRunning(false); setSecs(0); setTotal(0); setExName("");
  };

  const adjustTime = (delta) => {
    initAudio();
    const newSecs = Math.max(0, Math.ceil(secs) + delta);
    if (newSecs === 0) { reset(); return; }
    setSecs(newSecs);
    setTotal(t => Math.max(t, newSecs));
    if (running) {
      endTimeRef.current = Date.now() + newSecs * 1000;
    } else if (newSecs > 0) {
      endTimeRef.current = Date.now() + newSecs * 1000;
      setRunning(true);
    }
  };

  const displaySecs = Math.ceil(Math.max(0, secs));
  const prog = total > 0 ? displaySecs / total : 0;
  const C = 2 * Math.PI * 54;
  const done = total > 0 && displaySecs === 0 && !running;

  return (
    <div style={{ position: "fixed", bottom: 16, right: 16, zIndex: 1000, fontFamily: "'Barlow Condensed', system-ui, sans-serif" }}>
      {!open && (
        <button onClick={() => { initAudio(); setOpen(true); }} style={{
          width: 64, height: 64, borderRadius: "50%",
          background: running ? `linear-gradient(135deg, ${color}, ${accent})` : done ? "linear-gradient(135deg, #4CAF50, #69F0AE)" : "linear-gradient(135deg, #222, #333)",
          border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
          boxShadow: running ? `0 4px 24px ${color}60` : "0 4px 20px rgba(0,0,0,0.5)",
          transition: "all 0.3s ease", animation: done ? "pulse 1s ease infinite" : "none", position: "relative",
          WebkitTapHighlightColor: "transparent",
        }}>
          {running || displaySecs > 0 ? (
            <span style={{ fontSize: 17, fontWeight: 800, color: "#fff" }}>{fmt(displaySecs)}</span>
          ) : (
            <span style={{ fontSize: 24 }}>⏱</span>
          )}
          {running && (
            <svg width="68" height="68" style={{ position: "absolute", top: -2, left: -2, transform: "rotate(-90deg)" }}>
              <circle cx="34" cy="34" r="30" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="3" />
              <circle cx="34" cy="34" r="30" fill="none" stroke="#fff" strokeWidth="3" strokeDasharray={2 * Math.PI * 30} strokeDashoffset={2 * Math.PI * 30 * (1 - prog)} strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.5s linear" }} />
            </svg>
          )}
        </button>
      )}

      {open && (
        <div style={{
          width: "min(300px, calc(100vw - 32px))", background: "#141416",
          border: "1px solid rgba(255,255,255,0.1)", borderRadius: 20,
          padding: "18px 16px 14px",
          boxShadow: "0 8px 40px rgba(0,0,0,0.6)", animation: "scaleIn 0.2s ease",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, color: "#888" }}>⏱ REST TIMER</div>
            <button onClick={() => setOpen(false)} style={{
              background: "rgba(255,255,255,0.06)", border: "none", borderRadius: 8,
              color: "#888", cursor: "pointer", width: 32, height: 32,
              display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15,
              WebkitTapHighlightColor: "transparent",
            }}>✕</button>
          </div>

          {exName && (
            <div style={{ fontSize: 11, color: accent, fontWeight: 600, letterSpacing: 0.5, marginBottom: 10, textAlign: "center", fontFamily: "Barlow, sans-serif", padding: "6px 8px", background: `${color}15`, borderRadius: 8 }}>
              {exName}
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "center", marginBottom: 14, position: "relative" }}>
            <svg width="130" height="130" style={{ transform: "rotate(-90deg)" }}>

// Bridge component that connects parent state with Timer's internal endTimeRef
function TimerBridge({ secs, setSecs, running, setRunning, total, setTotal, exName, setExName, color, accent, startSignal }) {
  const [internalSecs, setInternalSecs] = useState(secs);
  const [internalRunning, setInternalRunning] = useState(running);
  const [internalTotal, setInternalTotal] = useState(total);
  const [internalExName, setInternalExName] = useState(exName);
  const endTimeRef = useRef(null);

  // Handle start signal from exercise buttons
  useEffect(() => {
    if (startSignal) {
      endTimeRef.current = Date.now() + startSignal.secs * 1000;
      setInternalSecs(startSignal.secs);
      setInternalTotal(startSignal.secs);
      setInternalExName(startSignal.name);
      setInternalRunning(true);
    }
  }, [startSignal]);

  return (
    <TimerCore
      endTimeRef={endTimeRef}
      secs={internalSecs} setSecs={setInternalSecs}
      running={internalRunning} setRunning={setInternalRunning}
      total={internalTotal} setTotal={setInternalTotal}
      exName={internalExName} setExName={setInternalExName}
      color={color} accent={accent}
    />
  );
}

function TimerCore({ endTimeRef, secs, setSecs, running, setRunning, total, setTotal, exName, setExName, color, accent }) {
  const [open, setOpen] = useState(false);
  const rafRef = useRef(null);
  const alertedRef = useRef(false);

  const checkTime = useCallback(() => {
    if (!endTimeRef.current) return;
    const remaining = (endTimeRef.current - Date.now()) / 1000;
    if (remaining <= 0) {
      setSecs(0); setRunning(false); endTimeRef.current = null;
      if (!alertedRef.current) { alertedRef.current = true; alertUser(); }
      return;
    }
    setSecs(remaining);
    rafRef.current = requestAnimationFrame(checkTime);
  }, []);

  useEffect(() => {
    if (running && endTimeRef.current) {
      alertedRef.current = false;
      rafRef.current = requestAnimationFrame(checkTime);
    }
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [running, checkTime]);

  // Fallback interval for background
  useEffect(() => {
    if (!running) return;
    const iv = setInterval(() => {
      if (!endTimeRef.current) { clearInterval(iv); return; }
      const remaining = (endTimeRef.current - Date.now()) / 1000;
      if (remaining <= 0) {
        setSecs(0); setRunning(false); endTimeRef.current = null;
        if (!alertedRef.current) { alertedRef.current = true; alertUser(); }
        clearInterval(iv);
      } else { setSecs(remaining); }
    }, 500);
    return () => clearInterval(iv);
  }, [running]);

  // Visibility change handler
  useEffect(() => {
    const h = () => {
      if (document.visibilityState === "visible" && endTimeRef.current) {
        const r = (endTimeRef.current - Date.now()) / 1000;
        if (r <= 0) {
          setSecs(0); setRunning(false); endTimeRef.current = null;
          if (!alertedRef.current) { alertedRef.current = true; alertUser(); }
        } else { setSecs(r); }
      }
    };
    document.addEventListener("visibilitychange", h);
    return () => document.removeEventListener("visibilitychange", h);
  }, []);

  const go = (s) => {
    initAudio(); alertedRef.current = false;
    endTimeRef.current = Date.now() + s * 1000;
    setSecs(s); setTotal(s); setRunning(true); setExName("");
  };

  const toggle = () => {
    initAudio();
    if (running) {
      const remaining = endTimeRef.current ? (endTimeRef.current - Date.now()) / 1000 : secs;
      endTimeRef.current = null;
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      setSecs(Math.max(0, remaining)); setRunning(false);
    } else if (secs > 0) {
      alertedRef.current = false;
      endTimeRef.current = Date.now() + Math.ceil(secs) * 1000;
      setRunning(true);
    }
  };

  const reset = () => {
    endTimeRef.current = null;
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    setRunning(false); setSecs(0); setTotal(0); setExName("");
  };

  const adjustTime = (delta) => {
    initAudio();
    const newSecs = Math.max(0, Math.ceil(secs) + delta);
    if (newSecs === 0) { reset(); return; }
    setSecs(newSecs); setTotal(t => Math.max(t, newSecs));
    alertedRef.current = false;
    endTimeRef.current = Date.now() + newSecs * 1000;
    if (!running) setRunning(true);
  };

  const d = Math.ceil(Math.max(0, secs));
  const prog = total > 0 ? d / total : 0;
  const C = 2 * Math.PI * 54;
  const done = total > 0 && d === 0 && !running;

  return (
    <div style={{ position: "fixed", bottom: 16, right: 16, zIndex: 1000, fontFamily: "'Barlow Condensed', system-ui, sans-serif" }}>
      {!open && (
        <button onClick={() => { initAudio(); setOpen(true); }} style={{
          width: 64, height: 64, borderRadius: "50%",
          background: running ? `linear-gradient(135deg, ${color}, ${accent})` : done ? "linear-gradient(135deg, #4CAF50, #69F0AE)" : "linear-gradient(135deg, #222, #333)",
          border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
          boxShadow: running ? `0 4px 24px ${color}60` : "0 4px 20px rgba(0,0,0,0.5)",
          transition: "all 0.3s ease", animation: done ? "pulse 1s ease infinite" : "none", position: "relative",
        }}>
          {running || d > 0 ? (
            <span style={{ fontSize: 17, fontWeight: 800, color: "#fff" }}>{fmt(d)}</span>
          ) : ( <span style={{ fontSize: 24 }}>⏱</span> )}
          {running && (
            <svg width="68" height="68" style={{ position: "absolute", top: -2, left: -2, transform: "rotate(-90deg)" }}>
              <circle cx="34" cy="34" r="30" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="3" />
              <circle cx="34" cy="34" r="30" fill="none" stroke="#fff" strokeWidth="3" strokeDasharray={2*Math.PI*30} strokeDashoffset={2*Math.PI*30*(1-prog)} strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.5s linear" }} />
            </svg>
          )}
        </button>
      )}

      {open && (
        <div style={{ width: "min(300px, calc(100vw - 32px))", background: "#141416", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 20, padding: "18px 16px 14px", boxShadow: "0 8px 40px rgba(0,0,0,0.6)", animation: "scaleIn 0.2s ease" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, color: "#888" }}>⏱ REST TIMER</div>
            <button onClick={() => setOpen(false)} style={{ background: "rgba(255,255,255,0.06)", border: "none", borderRadius: 8, color: "#888", cursor: "pointer", width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}>✕</button>
          </div>
          {exName && ( <div style={{ fontSize: 11, color: accent, fontWeight: 600, marginBottom: 10, textAlign: "center", fontFamily: "Barlow, sans-serif", padding: "6px 8px", background: `${color}15`, borderRadius: 8 }}>{exName}</div> )}
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 14, position: "relative" }}>
            <svg width="130" height="130" style={{ transform: "rotate(-90deg)" }}>
              <circle cx="65" cy="65" r="54" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="6" />
              <circle cx="65" cy="65" r="54" fill="none" stroke={done?"#4CAF50":running?accent:"#555"} strokeWidth="6" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={total>0?C*(1-prog):C} style={{ transition: "stroke-dashoffset 0.5s linear, stroke 0.3s ease" }} />
            </svg>
            <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", textAlign: "center" }}>
              <div style={{ fontSize: 36, fontWeight: 900, letterSpacing: -1, color: done?"#4CAF50":"#fff", animation: done?"pulse 1s ease infinite":"none" }}>{fmt(d)}</div>
              <div style={{ fontSize: 10, color: "#555", fontWeight: 600, letterSpacing: 1 }}>{done?"GO! 💪":running?"DESCANSANDO":total>0?"PAUSADO":"SELECIONE"}</div>
            </div>
          </div>
          <div style={{ display: "flex", justifyContent: "center", gap: 10, marginBottom: 14 }}>
            <button onClick={toggle} disabled={total===0&&d===0} style={{ padding: "10px 26px", borderRadius: 10, background: running?"rgba(255,255,255,0.08)":`linear-gradient(135deg,${color},${accent})`, border: "none", color: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 700, letterSpacing: 1, opacity: total===0?0.3:1, fontFamily: "Barlow Condensed, sans-serif", minHeight: 44 }}>{running?"⏸ PAUSAR":"▶ PLAY"}</button>
            <button onClick={reset} style={{ padding: "10px 16px", borderRadius: 10, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.08)", color: "#888", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "Barlow Condensed, sans-serif", minHeight: 44 }}>↺</button>
          </div>
          <div style={{ display: "flex", gap: 6, justifyContent: "center", flexWrap: "wrap" }}>
            {PRESETS.map(p => ( <button key={p} onClick={() => go(p)} style={{ padding: "8px 14px", borderRadius: 8, minHeight: 40, background: total===p&&(running||d>0)?`${color}30`:"rgba(255,255,255,0.04)", border: total===p&&(running||d>0)?`1px solid ${color}60`:"1px solid rgba(255,255,255,0.08)", color: total===p&&(running||d>0)?accent:"#aaa", cursor: "pointer", fontSize: 13, fontWeight: 700, fontFamily: "Barlow, sans-serif", transition: "all 0.2s ease" }}>{p<60?`${p}s`:`${p/60}min`}</button> ))}
          </div>
          <div style={{ display: "flex", justifyContent: "center", gap: 10, marginTop: 10 }}>
            <button onClick={() => adjustTime(-15)} style={{ padding: "6px 16px", borderRadius: 6, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", color: "#666", cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "Barlow, sans-serif", minHeight: 36 }}>-15s</button>
            <button onClick={() => adjustTime(15)} style={{ padding: "6px 16px", borderRadius: 6, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", color: "#666", cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "Barlow, sans-serif", minHeight: 36 }}>+15s</button>
          </div>
        </div>
      )}
    </div>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(CBumProgram));
  </script>
</body>
</html>
