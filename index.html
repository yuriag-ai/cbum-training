async function ld(k, fb) { try { const r = localStorage.getItem(k); return r !== null ? JSON.parse(r) : fb; } catch(e) { return fb; } }
async function sv(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { console.error(e); } }

// AUDIO & WAKE LOCK
// ═══════════════════════════════════════════════
const aRef = { ctx: null };
function initA() { if (!aRef.ctx) try { aRef.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} if ((aRef.ctx && aRef.ctx.state) === "suspended") aRef.ctx.resume().catch(()=>{}); }
function beep() { const c = aRef.ctx; if (!c) return; try { if (c.state==="suspended") c.resume(); const t=(f,s,d)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type="sine";g.gain.setValueAtTime(0.4,c.currentTime+s);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+s+d);o.start(c.currentTime+s);o.stop(c.currentTime+s+d);}; t(880,0,0.12);t(880,0.2,0.12);t(1174,0.42,0.3); } catch(e) {} }
function alertU() { beep(); if (navigator.vibrate) navigator.vibrate([200,100,200,100,300]); }

function useWakeLock() {
  const [active, setActive] = useState(false);
  const lockRef = useRef(null);
  const toggle = async () => {
    if (active && lockRef.current) { try { await lockRef.current.release(); } catch(e) {} lockRef.current = null; setActive(false); return; }
    try { if ("wakeLock" in navigator) { lockRef.current = await navigator.wakeLock.request("screen"); lockRef.current.addEventListener("release", () => { setActive(false); lockRef.current = null; }); setActive(true); } } catch(e) {}
  };
  useEffect(() => { const h = async () => { if (document.visibilityState === "visible" && active && !lockRef.current) { try { lockRef.current = await navigator.wakeLock.request("screen"); } catch(e) {} } }; document.addEventListener("visibilitychange", h); return () => document.removeEventListener("visibilitychange", h); }, [active]);
  return [active, toggle];
}

// TIMER FAB
// ═══════════════════════════════════════════════
function TimerFAB({ startSignal, color, accent }) {
  const [open,setOpen]=useState(false);const[secs,setSecs]=useState(0);const[run,setRun]=useState(false);const[total,setTotal]=useState(0);const[exN,setExN]=useState("");
  const eRef=useRef(null);const rRef=useRef(null);const aR=useRef(false);
  useEffect(()=>{if(startSignal){eRef.current=Date.now()+startSignal.secs*1000;setSecs(startSignal.secs);setTotal(startSignal.secs);setExN(startSignal.name);setRun(true);aR.current=false;}},[startSignal]);
  const tick=useCallback(()=>{if(!eRef.current)return;const r=(eRef.current-Date.now())/1000;if(r<=0){setSecs(0);setRun(false);eRef.current=null;if(!aR.current){aR.current=true;alertU();}return;}setSecs(r);rRef.current=requestAnimationFrame(tick);},[]);
  useEffect(()=>{if(run&&eRef.current){aR.current=false;rRef.current=requestAnimationFrame(tick);}return()=>{if(rRef.current)cancelAnimationFrame(rRef.current);};},[run,tick]);
  useEffect(()=>{if(!run)return;const iv=setInterval(()=>{if(!eRef.current){clearInterval(iv);return;}const r=(eRef.current-Date.now())/1000;if(r<=0){setSecs(0);setRun(false);eRef.current=null;if(!aR.current){aR.current=true;alertU();}clearInterval(iv);}else setSecs(r);},500);return()=>clearInterval(iv);},[run]);
  useEffect(()=>{const h=()=>{if(document.visibilityState==="visible"&&eRef.current){const r=(eRef.current-Date.now())/1000;if(r<=0){setSecs(0);setRun(false);eRef.current=null;if(!aR.current){aR.current=true;alertU();}}else setSecs(r);}};document.addEventListener("visibilitychange",h);return()=>document.removeEventListener("visibilitychange",h);},[]);
  const go=s=>{initA();aR.current=false;eRef.current=Date.now()+s*1000;setSecs(s);setTotal(s);setRun(true);setExN("");};
  const tog=()=>{initA();if(run){const r=eRef.current?(eRef.current-Date.now())/1000:secs;eRef.current=null;setSecs(Math.max(0,r));setRun(false);}else if(secs>0){aR.current=false;eRef.current=Date.now()+Math.ceil(secs)*1000;setRun(true);}};
  const rst=()=>{eRef.current=null;if(rRef.current)cancelAnimationFrame(rRef.current);setRun(false);setSecs(0);setTotal(0);setExN("");};
  const adj=d=>{initA();const n=Math.max(0,Math.ceil(secs)+d);if(n===0){rst();return;}setSecs(n);setTotal(t=>Math.max(t,n));aR.current=false;eRef.current=Date.now()+n*1000;if(!run)setRun(true);};
  const d=Math.ceil(Math.max(0,secs)), prog=total>0?d/total:0, C=2*Math.PI*54, done=total>0&&d===0&&!run;
  const B={WebkitTapHighlightColor:"transparent",cursor:"pointer",border:"none",fontFamily:"Barlow Condensed,sans-serif"};
  return(
    <div style={{position:"fixed",bottom:16,right:16,zIndex:1000,fontFamily:"'Barlow Condensed',sans-serif"}}>
      {!open&&<button onClick={()=>{initA();setOpen(true);}} style={{...B,width:64,height:64,borderRadius:"50%",background:run?`linear-gradient(135deg,${color},${accent})`:done?"linear-gradient(135deg,#4CAF50,#69F0AE)":"linear-gradient(135deg,#222,#333)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:run?`0 4px 24px ${color}60`:"0 4px 20px rgba(0,0,0,0.5)",animation:done?"pulse 1s ease infinite":"none",position:"relative"}}>{run||d>0?<span style={{fontSize:17,fontWeight:800,color:"#fff"}}>{fmt(d)}</span>:<span style={{fontSize:24}}>⏱</span>}{run&&<svg width="68" height="68" style={{position:"absolute",top:-2,left:-2,transform:"rotate(-90deg)"}}><circle cx="34" cy="34" r="30" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="3"/><circle cx="34" cy="34" r="30" fill="none" stroke="#fff" strokeWidth="3" strokeDasharray={2*Math.PI*30} strokeDashoffset={2*Math.PI*30*(1-prog)} strokeLinecap="round" style={{transition:"stroke-dashoffset .5s linear"}}/></svg>}</button>}
      {open&&<div style={{width:"min(300px,calc(100vw-32px))",background:"#141416",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"18px 16px 14px",boxShadow:"0 8px 40px rgba(0,0,0,0.6)",animation:"scaleIn .2s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:"#888"}}>⏱ REST TIMER</div><button onClick={()=>setOpen(false)} style={{...B,background:"rgba(255,255,255,0.06)",borderRadius:8,color:"#888",width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>✕</button></div>
        {exN&&<div style={{fontSize:11,color:accent,fontWeight:600,marginBottom:10,textAlign:"center",fontFamily:"Barlow,sans-serif",padding:"6px 8px",background:`${color}15`,borderRadius:8}}>{exN}</div>}
        <div style={{display:"flex",justifyContent:"center",marginBottom:14,position:"relative"}}><svg width="130" height="130" style={{transform:"rotate(-90deg)"}}><circle cx="65" cy="65" r="54" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="6"/><circle cx="65" cy="65" r="54" fill="none" stroke={done?"#4CAF50":run?accent:"#555"} strokeWidth="6" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={total>0?C*(1-prog):C} style={{transition:"stroke-dashoffset .5s linear,stroke .3s ease"}}/></svg><div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}><div style={{fontSize:36,fontWeight:900,letterSpacing:-1,color:done?"#4CAF50":"#fff",animation:done?"pulse 1s ease infinite":"none"}}>{fmt(d)}</div><div style={{fontSize:10,color:"#555",fontWeight:600,letterSpacing:1}}>{done?"GO! 💪":run?"DESCANSANDO":total>0?"PAUSADO":"SELECIONE"}</div></div></div>
        <div style={{display:"flex",justifyContent:"center",gap:10,marginBottom:14}}><button onClick={tog} disabled={total===0&&d===0} style={{...B,padding:"10px 26px",borderRadius:10,background:run?"rgba(255,255,255,0.08)":`linear-gradient(135deg,${color},${accent})`,color:"#fff",fontSize:13,fontWeight:700,letterSpacing:1,opacity:total===0?0.3:1,minHeight:44}}>{run?"⏸ PAUSAR":"▶ PLAY"}</button><button onClick={rst} style={{...B,padding:"10px 16px",borderRadius:10,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",color:"#888",fontSize:13,fontWeight:700,minHeight:44}}>↺</button></div>
        <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>{PRESETS.map(p=><button key={p} onClick={()=>go(p)} style={{...B,padding:"8px 14px",borderRadius:8,minHeight:40,background:total===p&&(run||d>0)?`${color}30`:"rgba(255,255,255,0.04)",border:total===p&&(run||d>0)?`1px solid ${color}60`:"1px solid rgba(255,255,255,0.08)",color:total===p&&(run||d>0)?accent:"#aaa",fontSize:13,fontWeight:700,fontFamily:"Barlow,sans-serif"}}>{p<60?`${p}s`:`${p/60}min`}</button>)}</div>
        <div style={{display:"flex",justifyContent:"center",gap:10,marginTop:10}}><button onClick={()=>adj(-15)} style={{...B,padding:"6px 16px",borderRadius:6,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",color:"#666",fontSize:12,fontWeight:600,fontFamily:"Barlow,sans-serif",minHeight:36}}>-15s</button><button onClick={()=>adj(15)} style={{...B,padding:"6px 16px",borderRadius:6,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",color:"#666",fontSize:12,fontWeight:600,fontFamily:"Barlow,sans-serif",minHeight:36}}>+15s</button></div>
      </div>}
    </div>
  );
}

            {archive.map((a, i) => <div key={i}><button onClick={() => setArcView(arcView === i ? null : i)} style={{ ...B, width: "100%", padding: "10px 12px", background: arcView === i ? "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, textAlign: "left", display: "flex", justifyContent: "space-between", alignItems: "center" }}><div><div style={{ fontSize: 12, fontWeight: 700, color: "#ccc" }}>{a.name}</div><div style={{ fontSize: 10, color: "#666", fontFamily: "Barlow,sans-serif" }}>{a.date} · {Object.values(a.weights).filter(v => v && v.v).length} cargas</div></div><span style={{ color: "#555", transform: arcView === i ? "rotate(180deg)" : "rotate(0)", transition: ".3s", display: "inline-block" }}>▾</span></button>
            {arcView === i && <div style={{ padding: 12, background: "rgba(255,255,255,0.03)", borderRadius: 10, border: "1px solid rgba(255,255,255,0.06)", marginTop: 4 }}>
              {Object.entries(a.weights).filter(([, v]) => (v && v.v)).map(([k, v]) => { const pts = k.split("-"); const di = parseInt(pts[1]); const ei = parseInt(pts[2]); const pr = P.find(x => x.id === pts[0]); const dd = (pr && pr.days[di]); const ae = dd ? [...dd.exercises, ...abPool[di]] : []; return <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", borderBottom: "1px solid rgba(255,255,255,0.04)", fontSize: 11, fontFamily: "Barlow,sans-serif" }}><span style={{ color: "#aaa" }}>D{di + 1} · {(ae[ei] && ae[ei].name) || `Ex ${ei + 1}`}</span><span style={{ color: "#FFD600", fontWeight: 700 }}>{v.v} <span style={{ color: "#555", fontWeight: 400 }}>({v.d})</span></span></div>; })}
            </div>}</div>)}
          </div>}
        </div>}

        {/* Day Selector */}
        <div style={{ display: "flex", gap: 5, marginBottom: 20, overflowX: "auto", scrollbarWidth: "none", WebkitOverflowScrolling: "touch" }}>
          {prog.days.map((w, i) => {
            const dayChecks = allEx.map((_, ei) => getChecks(i, ei));
            const totalSets = dayChecks.reduce((a, c) => a + c.length, 0);
            const doneSets = dayChecks.reduce((a, c) => a + c.filter(Boolean).length, 0);
            return <button key={i} onClick={() => setDay(i)} style={{ ...B, flex: "0 0 auto", minWidth: 85, padding: "10px 8px", background: day === i ? `linear-gradient(135deg,${w.color}30,${w.color}10)` : "rgba(255,255,255,0.03)", border: day === i ? `2px solid ${w.color}80` : "2px solid rgba(255,255,255,0.06)", borderRadius: 12, textAlign: "center" }}>
              <div style={{ fontSize: 9, letterSpacing: 2, color: day === i ? w.accent : "#666", fontWeight: 600, fontFamily: "Barlow,sans-serif" }}>DIA {w.day}</div>
              <div style={{ fontSize: 10, fontWeight: 800, color: day === i ? "#fff" : "#888", marginTop: 2 }}>{w.title}</div>
              <div style={{ fontSize: 13, marginTop: 1 }}>{w.emoji}</div>
              {doneSets > 0 && <div style={{ fontSize: 8, color: doneSets === totalSets ? "#4CAF50" : wo.accent, fontFamily: "Barlow,sans-serif", fontWeight: 700, marginTop: 2 }}>{doneSets}/{totalSets}</div>}
            </button>;
          })}
        </div>

        {/* Workout Title */}
        <h2 style={{ fontSize: "clamp(22px,5vw,38px)", fontWeight: 900, margin: "0 0 3px", letterSpacing: -1, color: "#fff" }}><span style={{ color: wo.color }}>{wo.emoji}</span> DIA {wo.day} — {wo.title}</h2>
        <div style={{ fontSize: 11, color: "#888", fontFamily: "Barlow,sans-serif", marginBottom: 16 }}>{wo.subtitle} · {allEx.length} ex · Marque os sets para auto-timer</div>

        {/* Exercises */}
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {allEx.map((ex, i) => {
            const tc = TC[ex.tag] || { bg: "rgba(255,255,255,0.08)", text: "#aaa" };
            const isAbs = i >= wo.exercises.length;
            const wData = getW(day, i);
            const ck = getChecks(day, i);
            const setCount = getSetCount(ex);
            const allDone = ck.every(Boolean);
            const lastEntry = (wData && wData.history && wData.history[0]);

            return (
              <div key={`${pid}-${day}-${i}`} style={{ padding: "10px 12px", background: allDone ? "rgba(76,175,80,0.04)" : isAbs ? "rgba(255,183,77,0.03)" : "rgba(255,255,255,0.025)", border: allDone ? "1px solid rgba(76,175,80,0.15)" : isAbs ? "1px solid rgba(255,183,77,0.12)" : "1px solid rgba(255,255,255,0.06)", borderRadius: 12, borderLeft: `3px solid ${allDone ? "#4CAF50" : isAbs ? "#FFB74D60" : wo.color + "60"}`, animation: `slideIn .3s ease ${i * 0.03}s both`, opacity: allDone ? 0.7 : 1, transition: "opacity .3s ease" }}>
                {/* Exercise name + tag */}
                <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 3, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: "#555" }}>{String(i + 1).padStart(2, "0")}</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: allDone ? "#4CAF50" : "#E8E6E3", textDecoration: allDone ? "line-through" : "none" }}>{ex.name}</span>
                  <span style={{ fontSize: 7, fontWeight: 700, letterSpacing: 1, padding: "2px 5px", borderRadius: 4, background: tc.bg, color: tc.text, textTransform: "uppercase", fontFamily: "Barlow,sans-serif" }}>{ex.tag}</span>
                </div>

                {/* Note */}
                <div style={{ fontSize: 10, color: "#666", fontFamily: "Barlow,sans-serif", lineHeight: 1.4, paddingLeft: 20, marginBottom: 6 }}>{ex.note}</div>

                {/* Sets checkboxes + weight + timer row */}
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", paddingLeft: 20 }}>
                  {/* Set circles */}
                  <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                    <span style={{ fontSize: 8, color: "#555", fontWeight: 600, fontFamily: "Barlow,sans-serif", letterSpacing: 1 }}>SETS</span>
                    {Array.from({ length: setCount }).map((_, si) => (
                      <button key={si} onClick={() => toggleSet(day, i, si)} style={{ ...B, width: 28, height: 28, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 800, background: ck[si] ? (isAbs ? "#FFB74D" : wo.color) : "rgba(255,255,255,0.06)", color: ck[si] ? "#fff" : "#555", border: ck[si] ? "none" : "2px solid rgba(255,255,255,0.1)", transition: "all .2s ease", minHeight: 28 }}>
                        {ck[si] ? "✓" : si + 1}
                      </button>
                    ))}
                  </div>

                  <div style={{ width: 1, height: 22, background: "rgba(255,255,255,0.06)" }} />

                  {/* Reps */}
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 7, color: "#555", letterSpacing: 1, fontWeight: 600, fontFamily: "Barlow,sans-serif" }}>REPS</div>
                    <div style={{ fontSize: 10, fontWeight: 600, color: "#ccc", fontFamily: "Barlow,sans-serif" }}>{ex.reps}</div>
                  </div>

                  <div style={{ width: 1, height: 22, background: "rgba(255,255,255,0.06)" }} />

                  {/* Weight */}
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 7, color: "#FFD600", letterSpacing: 1, fontWeight: 700, fontFamily: "Barlow,sans-serif" }}>CARGA</div>
                    <input type="text" inputMode="decimal" placeholder="—" value={(wData && wData.v) || ""} onChange={e => updateW(day, i, e.target.value)}
                      style={{ width: 50, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, color: "#FFD600", fontSize: 11, fontWeight: 700, fontFamily: "Barlow,sans-serif", textAlign: "center", padding: "3px 2px", outline: "none" }} />
                    {lastEntry && <div style={{ fontSize: 8, color: "#666", fontFamily: "Barlow,sans-serif", marginTop: 1 }}>ant: {lastEntry.v} ({lastEntry.d})</div>}
                  </div>

                  {/* Timer */}
                  <button onClick={() => trigS(ex.rest, ex.name)} style={{ ...B, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "rgba(255,255,255,0.04)", border: `1px solid ${isAbs ? "#FFB74D30" : wo.color + "30"}`, borderRadius: 8, padding: "4px 6px", minWidth: 36, minHeight: 36 }}>
                    <div style={{ fontSize: 11 }}>⏱</div>
                    <div style={{ fontSize: 8, color: isAbs ? "#FFB74D" : wo.accent, fontWeight: 700, fontFamily: "Barlow,sans-serif" }}>{ex.rest}s</div>
                  </button>
                </div>
              </div>
            );
          })}
        </div>

        {/* Summary */}
        <div style={{ marginTop: 18, padding: "12px 14px", background: `linear-gradient(135deg,${wo.color}10,transparent)`, border: `1px solid ${wo.color}25`, borderRadius: 12, display: "flex", justifyContent: "space-around", flexWrap: "wrap", gap: 10 }}>
          {[["EXERCÍCIOS", allEx.length], ["TOTAL SETS", allEx.reduce((a, e) => a + getSetCount(e), 0)], ["CONCLUÍDOS", allEx.reduce((a, _, i) => a + getChecks(day, i).filter(Boolean).length, 0)]].map(([l, v], idx) => <div key={idx} style={{ textAlign: "center" }}><div style={{ fontSize: 9, color: "#666", letterSpacing: 2, fontWeight: 600, fontFamily: "Barlow,sans-serif" }}>{l}</div><div style={{ fontSize: 22, fontWeight: 900, color: idx === 2 ? "#4CAF50" : wo.accent }}>{v}</div></div>)}
        </div>

        <div style={{ marginTop: 16, padding: "10px 14px", background: "rgba(255,255,255,0.02)", border: "1px dashed rgba(255,255,255,0.08)", borderRadius: 10, fontSize: 11, color: "#666", fontFamily: "Barlow,sans-serif", textAlign: "center", lineHeight: 1.6 }}>
          <strong style={{ color: "#888" }}>DIA 7 — REST DAY</strong> · Recuperação · 7-9h sono · Proteína alta
        </div>
        <div style={{ marginTop: 20, textAlign: "center", fontSize: 10, color: "#444", fontFamily: "Barlow,sans-serif", lineHeight: 1.8 }}>
          Baseado nos treinos públicos de Chris Bumstead · 3 programas · Cargas + evolução salvos
        </div>
      </div>

      <style>{`
        @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
        @keyframes scaleIn{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        ::-webkit-scrollbar{display:none}
        input::placeholder{color:#444}
        input:focus{border-color:#FFD600!important;background:rgba(255,215,0,0.08)!important}
      `}</style>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
